<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | KP12 Performance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@500&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon-32x32.png">
</head>
<body>

    <div class="auth-page">

        <div class="auth-visual">
            <div class="auth-visual-overlay">
                <p class="eyebrow">[ NEW PASSWORD ]</p>
                <h2 class="auth-visual-title">FRESH<br>START.</h2>
            </div>
        </div>

        <div class="auth-panel">
            <a href="index.html" class="auth-brand">
                <img src="logo.png" alt="KP12 Performance" class="auth-logo">
            </a>

            <div class="auth-form-wrap">

                <div id="reset-invalid" style="display:none;">
                    <p class="eyebrow" style="color:var(--training);">[ LINK EXPIRED ]</p>
                    <h1 class="auth-title">Expired</h1>
                    <p class="auth-sub">This reset link is invalid or has already been used. Request a new one below.</p>
                    <a href="forgot-password.html" class="auth-switch" style="display:inline-block;margin-top:24px;">← Request a new link</a>
                </div>

                <div id="reset-form-wrap">
                    <p class="eyebrow">[ RESET PASSWORD ]</p>
                    <h1 class="auth-title">New Password</h1>
                    <p class="auth-sub">Choose a new password for your account. Must be at least 8 characters.</p>

                    <form id="reset-form" class="auth-form">
                        <div class="field">
                            <label for="new-password">New Password</label>
                            <input type="password" id="new-password" placeholder="Min. 8 characters" required minlength="8">
                        </div>
                        <div class="field">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" placeholder="Repeat your new password" required>
                        </div>
                        <button type="submit">Set New Password</button>
                    </form>

                    <p class="auth-error" id="reset-error"></p>
                </div>

            </div>
        </div>

    </div>

    <script>
        // Pull the token out of the URL (?token=abc123...)
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token) {
            document.getElementById("reset-form-wrap").style.display = "none";
            document.getElementById("reset-invalid").style.display = "block";
        }

        document.getElementById("reset-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const password = document.getElementById("new-password").value;
            const confirm = document.getElementById("confirm-password").value;
            const errorEl = document.getElementById("reset-error");
            const btn = e.target.querySelector("button[type='submit']");

            errorEl.style.display = "none";

            if (password !== confirm) {
                errorEl.textContent = "Passwords don't match — please try again.";
                errorEl.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Updating...";

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    // Token expired or already used
                    if (res.status === 400) {
                        document.getElementById("reset-form-wrap").style.display = "none";
                        document.getElementById("reset-invalid").style.display = "block";
                    } else {
                        errorEl.textContent = data.error || "Something went wrong. Please try again.";
                        errorEl.style.display = "block";
                        btn.disabled = false;
                        btn.textContent = "Set New Password";
                    }
                    return;
                }

                // Success — logged in automatically, redirect home
                window.location.href = "index.html";

            } catch (err) {
                errorEl.textContent = "Couldn't reach the server. Please try again.";
                errorEl.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Set New Password";
            }
        });
    </script>

</body>
</html>
