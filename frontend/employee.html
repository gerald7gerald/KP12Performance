    <section class="emp-page">

    </section>

    <footer class="site-footer">

            </a>
            <div class="site-footer-socials">

    <script src="script.js"></script>
    <script src="nav.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {

        fetch('/api/auth/me')
            .then(res => res.ok ? res.json() : null)
            .then(data => {
                if (!data || !data.user || !data.user.is_admin) {
                    window.location.href = "index.html";
                    return;
                }
                loadUsers();
            })
            .catch(() => { window.location.href = "index.html"; });

        let allUsers = [];

        function loadUsers() {
            fetch('/api/admin/users')
                .then(res => res.json())
                .then(users => {
                    allUsers = users;
                    renderTable(users);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("emp-table-wrap").innerHTML =
                        '<p class="emp-loading">Failed to load member data. Please try again.</p>';
                });
        }

        function e(str) {
            if (!str && str !== 0) return "—";
            const d = document.createElement("div");
            d.textContent = String(str);
            return d.innerHTML;
        }

        function renderTable(users) {
            const wrap = document.getElementById("emp-table-wrap");
            const countEl = document.getElementById("emp-count");
            countEl.textContent = `${users.length} member${users.length !== 1 ? "s" : ""}`;

            if (users.length === 0) {
                wrap.innerHTML = '<p class="emp-loading">No members found.</p>';
                return;
            }

            wrap.innerHTML = `
                <table class="emp-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Role</th>
                            <th>Athlete Name</th>
                            <th>Athlete Age</th>
                            <th>Athlete Gender</th>
                            <th>Heard From</th>
                            <th>Referral Detail</th>
                            <th>Admin</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(u => `
                            <tr>
                                <td class="emp-id">${u.id}</td>
                                <td>${e(u.username)}</td>
                                <td><a href="mailto:${e(u.email)}" class="emp-email-link">${e(u.email)}</a></td>
                                <td>${u.phone ? `<a href="tel:${e(u.phone)}" class="emp-email-link">${e(u.phone)}</a>` : "—"}</td>
                                <td>${e(u.age)}</td>
                                <td>${e(u.gender)}</td>
                                <td>${u.role === "parent_guardian" ? '<span class="emp-role-badge">Parent</span>' : e(u.role) === "—" ? "—" : "Athlete"}</td>
                                <td>${e(u.athlete_name)}</td>
                                <td>${e(u.athlete_age)}</td>
                                <td>${e(u.athlete_gender)}</td>
                                <td>${e(u.referral_source)}</td>
                                <td>${e(u.referral_detail)}</td>
                                <td>${u.is_admin ? '<span class="emp-admin-badge">ADMIN</span>' : "—"}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `;
        }

        document.getElementById("emp-search").addEventListener("input", (ev) => {
            const q = ev.target.value.toLowerCase().trim();
            if (!q) { renderTable(allUsers); return; }
            const filtered = allUsers.filter(u =>
                (u.username        || "").toLowerCase().includes(q) ||
                (u.email           || "").toLowerCase().includes(q) ||
                (u.phone           || "").toLowerCase().includes(q) ||
                (u.athlete_name    || "").toLowerCase().includes(q) ||
                (u.referral_source || "").toLowerCase().includes(q) ||
                (u.referral_detail || "").toLowerCase().includes(q)
            );
            renderTable(filtered);
        });
    });
    </script>

</body>
</html>
