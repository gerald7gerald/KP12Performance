<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | KP12 Performance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@500&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon-32x32.png">
</head>
<body>

    <div class="auth-page">

        <div class="auth-visual">
            <div class="auth-visual-overlay">
                <p class="eyebrow">[ ACCOUNT RECOVERY ]</p>
                <h2 class="auth-visual-title">LOCKED<br>OUT?<br>WE GOT<br>YOU.</h2>
            </div>
        </div>

        <div class="auth-panel">
            <a href="index.html" class="auth-brand">
                <img src="logo.png" alt="KP12 Performance" class="auth-logo">
            </a>

            <div class="auth-form-wrap">
                <p class="eyebrow">[ FORGOT PASSWORD ]</p>
                <h1 class="auth-title">Reset</h1>
                <p class="auth-sub">Enter the email on your account and we'll send you a reset link.</p>

                <form id="forgot-form" class="auth-form">
                    <div class="field">
                        <label for="forgot-email">Email</label>
                        <input type="email" id="forgot-email" placeholder="you@example.com" required>
                    </div>
                    <button type="submit">Send Reset Link</button>
                </form>

                <p class="auth-error" id="forgot-error"></p>
                <p class="auth-success" id="forgot-success"></p>

                <p class="auth-switch">Remembered it? <a href="login.html">Back to Login</a></p>
            </div>
        </div>

    </div>

    <script>
        document.getElementById("forgot-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("forgot-email").value.trim();
            const errorEl = document.getElementById("forgot-error");
            const successEl = document.getElementById("forgot-success");
            const btn = e.target.querySelector("button[type='submit']");

            errorEl.style.display = "none";
            successEl.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Sending...";

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.error || "Something went wrong. Please try again.";
                    errorEl.style.display = "block";
                    btn.disabled = false;
                    btn.textContent = "Send Reset Link";
                    return;
                }

                // Show success regardless — backend never reveals if email exists
                successEl.textContent = data.message;
                successEl.style.display = "block";
                e.target.style.display = "none";

            } catch (err) {
                errorEl.textContent = "Couldn't reach the server. Please try again.";
                errorEl.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Send Reset Link";
            }
        });
    </script>

</body>
</html>
