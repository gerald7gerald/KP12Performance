<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | KP12 Performance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@500&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-page">

        <div class="auth-visual">
            <div class="auth-visual-overlay">
                <p class="eyebrow">[ JOIN THE PROGRAM ]</p>
                <h2 class="auth-visual-title">TRAIN WITH<br>PURPOSE.</h2>
            </div>
        </div>

        <div class="auth-panel">
            <a href="index.html" class="auth-brand">
                <img src="logo.png" alt="KP12 Performance" class="auth-logo">
            </a>

            <div class="auth-form-wrap">
                <p class="eyebrow">[ CREATE ACCOUNT ]</p>
                <h1 class="auth-title">Sign Up</h1>
                <p class="auth-sub">Set up an account to book sessions and track your progress.</p>

                <form id="signup-form" class="auth-form">

                    <div class="field">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" placeholder="Username" required>
                    </div>
                    <div class="field">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" placeholder="you@example.com" required>
                    </div>
                    <div class="field">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="Password" required>
                    </div>
                    <div class="field">
                        <label for="signup-phone">Phone Number</label>
                        <input type="tel" id="signup-phone" placeholder="(555) 000-0000">
                    </div>
                    <div class="auth-form-row">
                        <div class="field">
                            <label for="signup-age">Your Age</label>
                            <input type="number" id="signup-age" placeholder="Age" min="5" max="100">
                        </div>
                        <div class="field">
                            <label for="signup-gender">Your Gender</label>
                            <select id="signup-gender">
                                <option value="" disabled selected>Select</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Prefer not to say">Prefer not to say</option>
                            </select>
                        </div>
                    </div>

                    <!-- Role selection -->
                    <div class="field">
                        <label>Are you the athlete or a parent/guardian?</label>
                        <div class="role-toggle">
                            <button type="button" class="role-btn role-btn--active" data-role="athlete">
                                I'm the Athlete
                            </button>
                            <button type="button" class="role-btn" data-role="parent_guardian">
                                Parent / Guardian
                            </button>
                        </div>
                        <input type="hidden" id="signup-role" value="athlete">
                    </div>

                    <!-- Athlete entries (only shown for parent/guardian) -->
                    <div id="athlete-section" style="display:none;">
                        <div id="athlete-list"></div>
                        <button type="button" id="add-athlete-btn" class="add-athlete-btn">
                            + Add Another Athlete
                        </button>
                    </div>

                    <!-- How did you hear about us -->
                    <div class="field">
                        <label for="signup-referral">How did you hear about us?</label>
                        <select id="signup-referral">
                            <option value="" disabled selected>Select an option</option>
                            <option value="Social Media">Social Media (TikTok, YouTube, Instagram)</option>
                            <option value="Google/Yelp">Google / Yelp Ad</option>
                            <option value="School">School</option>
                            <option value="Friend/Family">Friend / Family</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div id="referral-friend" class="field" style="display:none;">
                        <label for="referral-friend-name">Friend or family member's full name</label>
                        <input type="text" id="referral-friend-name" placeholder="Full name">
                    </div>
                    <div id="referral-other" class="field" style="display:none;">
                        <label for="referral-other-text">Please describe</label>
                        <input type="text" id="referral-other-text" placeholder="Tell us how you found us">
                    </div>

                    <button type="submit">Create Account</button>
                </form>

                <p class="auth-error" id="signup-error"></p>
                <p class="auth-switch">Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>

    </div>

    <script src="auth.js"></script>
    <script>
    let athleteCount = 0;

    function createAthleteEntry(index) {
        const div = document.createElement("div");
        div.className = "athlete-entry";
        div.dataset.index = index;
        div.innerHTML = `
            <div class="athlete-entry-header">
                <p class="athlete-fields-label">[ ATHLETE ${index + 1} ]</p>
                ${index > 0 ? `<button type="button" class="remove-athlete-btn" onclick="removeAthlete(this)">Remove</button>` : ""}
            </div>
            <div class="field">
                <label>Athlete's Full Name</label>
                <input type="text" class="athlete-name-input" placeholder="Full name">
            </div>
            <div class="auth-form-row">
                <div class="field">
                    <label>Athlete's Age</label>
                    <input type="number" class="athlete-age-input" placeholder="Age" min="1" max="30">
                </div>
                <div class="field">
                    <label>Athlete's Gender</label>
                    <select class="athlete-gender-input">
                        <option value="" disabled selected>Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>
                </div>
            </div>
        `;
        return div;
    }

    function addAthlete() {
        const list = document.getElementById("athlete-list");
        list.appendChild(createAthleteEntry(athleteCount));
        athleteCount++;
        renumberAthletes();
    }

    function removeAthlete(btn) {
        btn.closest(".athlete-entry").remove();
        renumberAthletes();
    }

    function renumberAthletes() {
        document.querySelectorAll(".athlete-entry").forEach((entry, i) => {
            entry.querySelector(".athlete-fields-label").textContent = `[ ATHLETE ${i + 1} ]`;
        });
    }

    // Role toggle
    document.querySelectorAll(".role-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("role-btn--active"));
            btn.classList.add("role-btn--active");
            const role = btn.dataset.role;
            document.getElementById("signup-role").value = role;
            const section = document.getElementById("athlete-section");
            if (role === "parent_guardian") {
                section.style.display = "flex";
                if (athleteCount === 0) addAthlete(); // add first entry automatically
            } else {
                section.style.display = "none";
            }
        });
    });

    document.getElementById("add-athlete-btn").addEventListener("click", addAthlete);

    // Referral conditional fields
    document.getElementById("signup-referral").addEventListener("change", function () {
        document.getElementById("referral-friend").style.display =
            this.value === "Friend/Family" ? "flex" : "none";
        document.getElementById("referral-other").style.display =
            this.value === "Other" ? "flex" : "none";
    });
    </script>

</body>
</html>
